<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard SC — Label Code</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg:#0f1117; --surface:#1a1d27; --surface2:#22263a; --border:#2e3347;
  --text:#e2e8f0; --muted:#8892a4;
  --blue:#4f7ef8; --cyan:#22d3ee; --green:#34d399; --amber:#fbbf24;
  --red:#f87171; --purple:#a78bfa;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;line-height:1.5}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.header h1{font-size:17px;font-weight:600}
.header .sub{font-size:12px;color:var(--muted);margin-top:2px}
.upd{font-size:11px;color:var(--muted)}
.bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.bar label{font-size:12px;color:var(--muted);margin-right:4px}
select{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:13px;cursor:pointer}
.main{padding:20px 24px;max-width:1400px;margin:0 auto}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px}
.kpi .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.kpi .val{font-size:26px;font-weight:700}
.kpi .hint{font-size:11px;color:var(--muted);margin-top:2px}
.kpi.blue .val{color:var(--blue)} .kpi.green .val{color:var(--green)}
.kpi.amber .val{color:var(--amber)} .kpi.purple .val{color:var(--purple)}
.row{display:grid;gap:14px;margin-bottom:14px}
.row.cols2{grid-template-columns:1fr 1fr}
.row.full{grid-template-columns:1fr}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px}
.card h3{font-size:13px;font-weight:600;margin-bottom:14px;color:var(--text)}
.wrap{position:relative;height:230px}
.wrap-tall{position:relative;height:280px}
.hm{overflow-x:auto;margin-top:4px}
table.ht{border-collapse:collapse;width:100%;font-size:12px}
table.ht th{background:var(--surface2);color:var(--muted);padding:7px 10px;text-align:left;border:1px solid var(--border);font-weight:500;white-space:nowrap}
table.ht td{border:1px solid var(--border);padding:7px 10px;text-align:center;min-width:65px}
table.ht td.s{text-align:left;color:var(--text);font-weight:500;white-space:nowrap;background:var(--surface2)}
@media(max-width:768px){.row.cols2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="header">
  <div>
    <h1>Dashboard · Solicitações de Correção</h1>
    <div class="sub">Label Code — Gestão de Qualidade</div>
  </div>
  <div class="upd" id="upd"></div>
</div>
<div class="bar">
  <div><label>Ano:</label><select id="fano" onchange="render()"><option value="">Todos</option></select></div>
  <div><label>Mês:</label><select id="fmes" onchange="render()"><option value="">Todos</option></select></div>
  <div><label>Setor:</label><select id="fset" onchange="render()"><option value="">Todos</option></select></div>
</div>
<div class="main">
  <div class="kpis" id="kpis"></div>
  <div class="row full">
    <div class="card"><h3>Volume mensal de SCs</h3><div class="wrap"><canvas id="cMes"></canvas></div></div>
  </div>
  <div class="row cols2">
    <div class="card"><h3>SCs por setor</h3><div class="wrap"><canvas id="cSet"></canvas></div></div>
    <div class="card"><h3>Tipos de divergência (top 10)</h3><div class="wrap-tall"><canvas id="cTip"></canvas></div></div>
  </div>
  <div class="row full">
    <div class="card"><h3>Heatmap — Setor × Tipo de divergência</h3><div class="hm" id="hm"></div></div>
  </div>
</div>

Chart.defaults.color='#8892a4';
Chart.defaults.borderColor='#2e3347';
Chart.defaults.font.family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif";
const PAL=['#4f7ef8','#34d399','#fbbf24','#a78bfa','#f87171','#22d3ee','#fb923c','#e879f9'];
const KCLS=['blue','green','amber','purple','','','',''];
let ch={};
document.getElementById('upd').textContent='Atualizado em '+D.updated;
const sa=document.getElementById('fano'), ss=document.getElementById('fset');
D.anos.forEach(a=>{if(a>0)sa.innerHTML+=`<option value="${a}">${a}</option>`});
D.setores.forEach(s=>ss.innerHTML+=`<option value="${s}">${s}</option>`);
const sm=document.getElementById('fmes');
['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'].forEach((m,i)=>sm.innerHTML+=`<option value="${String(i+1).padStart(2,'0')}">${m}</option>`);
function grp(arr,k){return arr.reduce((a,r)=>{a[r[k]]=(a[r[k]]||0)+1;return a},{})}
function render(){
  const ano=sa.value, mes=document.getElementById('fmes').value, set=ss.value;
  let r=D.raw;
  if(ano) r=r.filter(x=>x._periodo&&x._periodo.startsWith(ano));
  if(mes) r=r.filter(x=>x._periodo&&x._periodo.slice(5)===mes);
  if(set) r=r.filter(x=>x._setor===set);
  const n=r.length;
  const bySect=grp(r,'_setor');
  const sects=Object.entries(bySect).sort((a,b)=>b[1]-a[1]);
  let k=`<div class="kpi blue"><div class="lbl">Total de SCs</div><div class="val">${n}</div></div>`;
  sects.forEach(([s,v],i)=>{
    const pct=n>0?((v/n)*100).toFixed(0):0;
    k+=`<div class="kpi ${KCLS[i%KCLS.length]}"><div class="lbl">${s}</div><div class="val">${v}</div><div class="hint">${pct}% do total</div></div>`;
  });
  document.getElementById('kpis').innerHTML=k;
  const byP={};
  r.forEach(x=>{if(x._periodo)byP[x._periodo]=(byP[x._periodo]||0)+1});
  const per=Object.keys(byP).sort(), vals=per.map(p=>byP[p]);
  function linreg(v){const n=v.length;if(n<2)return v.map(()=>null);let sx=0,sy=0,sxy=0,sx2=0;v.forEach((y,x)=>{sx+=x;sy+=y;sxy+=x*y;sx2+=x*x});const sl=(n*sxy-sx*sy)/(n*sx2-sx*sx||1),ic=(sy-sl*sx)/n;return v.map((_,x)=>+(sl*x+ic).toFixed(1))}
  const trend=linreg(vals);
  if(ch.m)ch.m.destroy();
  ch.m=new Chart(document.getElementById('cMes'),{
    type:'bar',
    data:{labels:per,datasets:[
      {label:'SCs',data:vals,backgroundColor:'rgba(79,126,248,.7)',borderColor:'#4f7ef8',borderWidth:1,borderRadius:4},
      {type:'line',label:'Tendência',data:trend,borderColor:'#fbbf24',borderWidth:2,borderDash:[6,3],pointRadius:0,tension:0,fill:false,order:0}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,labels:{boxWidth:12,padding:10,color:'#8892a4'}}},scales:{x:{grid:{color:'#2e3347'}},y:{grid:{color:'#2e3347'},beginAtZero:true,ticks:{stepSize:1}}}}
  });
  const sL=sects.map(e=>e[0]),sV=sects.map(e=>e[1]);
  if(ch.s)ch.s.destroy();
  ch.s=new Chart(document.getElementById('cSet'),{
    type:'doughnut',
    data:{labels:sL,datasets:[{data:sV,backgroundColor:PAL,borderWidth:2,borderColor:'#1a1d27'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right'}}}
  });
  const byT=grp(r,'_tipo');
  const tE=Object.entries(byT).sort((a,b)=>b[1]-a[1]).slice(0,10);
  if(ch.t)ch.t.destroy();
  ch.t=new Chart(document.getElementById('cTip'),{
    type:'bar',
    data:{labels:tE.map(e=>e[0]),datasets:[{label:'SCs',data:tE.map(e=>e[1]),backgroundColor:'rgba(52,211,153,.7)',borderColor:'#34d399',borderWidth:1,borderRadius:4}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'#2e3347'},beginAtZero:true},y:{grid:{display:false}}}}
  });
  const aS=[...new Set(r.map(x=>x._setor))].sort();
  const aT=[...new Set(r.map(x=>x._tipo))].filter(Boolean).sort();
  const mx={};
  r.forEach(x=>{if(!mx[x._setor])mx[x._setor]={};mx[x._setor][x._tipo]=(mx[x._setor][x._tipo]||0)+1});
  const maxV=Math.max(...aS.flatMap(s=>aT.map(t=>mx[s]?.[t]||0)),1);
  let h='<table class="ht"><thead><tr><th>Setor</th>';
  aT.forEach(t=>h+=`<th>${t}</th>`);
  h+='</tr></thead><tbody>';
  aS.forEach(s=>{
    h+=`<tr><td class="s">${s}</td>`;
    aT.forEach(t=>{
      const v=mx[s]?.[t]||0;
      const i=v/maxV;
      const bg=v>0?`rgba(79,126,248,${(0.12+i*0.78).toFixed(2)})` :'transparent';
      const c=i>0.55?'#fff':(v>0?'#a8c0ff':'#4a4f65');
      h+=`<td style="background:${bg};color:${c}">${v||''}</td>`;
    });
    h+='</tr>';
  });
  h+='</tbody></table>';
  document.getElementById('hm').innerHTML=h;
}
